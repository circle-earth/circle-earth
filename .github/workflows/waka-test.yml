name: Waka Python Test

on:
  pull_request:
    paths:
      - '.github/workflows/waka.yml'

jobs:
  test-python-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4

      - name: Checkout private stats updater
        uses: actions/checkout@v4
        with:
          repository: circle-earth/waka-readme-stats
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: waka-readme-stats
          ref: master

      - name: Extract Python Version from waka.yml
        id: get-python
        run: |
          PYTHON_VERSION=$(grep 'python-version:' .github/workflows/waka.yml | head -n 1 | awk -F'"' '{print $2}')
          if [ -z "$PYTHON_VERSION" ]; then
             PYTHON_VERSION=$(grep 'python-version:' .github/workflows/waka.yml | head -n 1 | awk '{print $2}')
          fi
          echo "version=$PYTHON_VERSION" >> $GITHUB_OUTPUT

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ steps.get-python.outputs.version }}
          cache: pip
          cache-dependency-path: waka-readme-stats/requirements.txt

      - name: Install dependencies
        run: python -m pip install -r waka-readme-stats/requirements.txt

      - name: Syntax & Compatibility Check
        run: |
          python -m py_compile waka-readme-stats/sources/main.py
          echo "Syntax check passed on Python ${{ steps.get-python.outputs.version }}!"
